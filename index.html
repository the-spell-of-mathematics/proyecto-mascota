<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodiak, the bear</title>
    
    <!-- Tipografía redondeada estilo cómic -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Kodiak, the bear</h1>
        
        <!-- Contenedor de la imagen -->
        <div class="pet-container">
            <img id="pet-image" src="oso_normal.gif" alt="Osito Kodiak">
        </div>

        <!-- Estadísticas de la mascota -->
        <div class="status">
            <p>Hambre: <span id="hambre">50</span>/100</p>
            <p>Felicidad: <span id="felicidad">50</span>/100</p>
            <p>Energía: <span id="energia">100</span>/100</p>
        </div>

        <!-- Botones de acción -->
        <div class="actions">
            <button class="btn-alimentar" onclick="alimentar()">Alimentar 🧁</button>
            <button class="btn-jugar" onclick="jugar()">Jugar 🎈</button>
            <button class="btn-dormir" onclick="dormir()">Dormir 💤</button>
        </div>
    </div>
    
    <!-- Enlace correcto a tu archivo JavaScript -->
    <script src="mascota.js"></script>
</body>
</html>
